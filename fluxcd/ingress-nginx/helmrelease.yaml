apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx
  namespace: flux-system
spec:
  interval: 10m
  targetNamespace: ingress-nginx
  chart:
    spec:
      chart: ingress-nginx
      version: "4.13.1"
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
      interval: 5m
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    controller:
      service:
        type: LoadBalancer
        loadBalancerIP: ${LOAD_BALANCER_IP}
      replicaCount: 2
      resources:
        limits:
          memory: 512Mi
        requests:
          cpu: .25
          memory: 256Mi

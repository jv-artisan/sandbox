apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: longhorn-rwo-data
  namespace: longhorn-chaos-workload
  labels:
    app.kubernetes.io/name: longhorn-rwo-writer
    app.kubernetes.io/part-of: longhorn-validation
spec:
  storageClassName: longhorn
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: longhorn-rwo-writer
  namespace: longhorn-chaos-workload
  labels:
    app.kubernetes.io/name: longhorn-rwo-writer
    app.kubernetes.io/part-of: longhorn-validation
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: longhorn-rwo-writer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: longhorn-rwo-writer
        app.kubernetes.io/part-of: longhorn-validation
    spec:
      terminationGracePeriodSeconds: 5
      containers:
        - name: writer
          image: alpine:3.20
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              mkdir -p /data/checksums /data/heartbeats

              if [ ! -f /data/checksums/blob.sha256 ]; then
                dd if=/dev/urandom of=/data/blob.bin bs=1M count=64 conv=fsync
                sha256sum /data/blob.bin > /data/checksums/blob.sha256
              fi

              while true; do
                sha256sum -c /data/checksums/blob.sha256
                {
                  printf '%s node=%s pod=%s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "${K8S_NODE_NAME}" "${HOSTNAME}"
                  stat -c 'blob_size=%s blob_mtime=%y' /data/blob.bin
                } >> /data/heartbeats/rwo.log
                sync
                sleep 5
              done
          env:
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - test -f /data/checksums/blob.sha256 && sha256sum -c /data/checksums/blob.sha256
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - test -f /data/checksums/blob.sha256 && sha256sum -c /data/checksums/blob.sha256
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: longhorn-rwo-data

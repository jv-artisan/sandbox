apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: longhorn-rwx-data
  namespace: longhorn-chaos-workload
  labels:
    app.kubernetes.io/name: longhorn-rwx-writer
    app.kubernetes.io/part-of: longhorn-validation
spec:
  storageClassName: longhorn
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: longhorn-rwx-writer
  namespace: longhorn-chaos-workload
  labels:
    app.kubernetes.io/name: longhorn-rwx-writer
    app.kubernetes.io/part-of: longhorn-validation
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: longhorn-rwx-writer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: longhorn-rwx-writer
        app.kubernetes.io/part-of: longhorn-validation
    spec:
      terminationGracePeriodSeconds: 5
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: longhorn-rwx-writer
      containers:
        - name: writer
          image: alpine:3.20
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              mkdir -p /shared/checksums /shared/heartbeats /shared/writers

              if [ ! -f "/shared/checksums/${HOSTNAME}.sha256" ]; then
                dd if=/dev/urandom of="/shared/writers/${HOSTNAME}.bin" bs=1M count=32 conv=fsync
                sha256sum "/shared/writers/${HOSTNAME}.bin" > "/shared/checksums/${HOSTNAME}.sha256"
              fi

              while true; do
                sha256sum -c "/shared/checksums/${HOSTNAME}.sha256"
                printf '%s node=%s pod=%s writer_files=%s\n' \
                  "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
                  "${K8S_NODE_NAME}" \
                  "${HOSTNAME}" \
                  "$(find /shared/writers -type f | wc -l)" \
                  >> "/shared/heartbeats/${HOSTNAME}.log"
                sync
                sleep 5
              done
          env:
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: shared
              mountPath: /shared
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - test -f "/shared/checksums/${HOSTNAME}.sha256" && sha256sum -c "/shared/checksums/${HOSTNAME}.sha256"
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - test -f "/shared/checksums/${HOSTNAME}.sha256" && sha256sum -c "/shared/checksums/${HOSTNAME}.sha256"
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
      volumes:
        - name: shared
          persistentVolumeClaim:
            claimName: longhorn-rwx-data

resources:
  - kube-prometheus-stack.yaml
  # Longhorn is installed by the edge ansible playbook. The parent app-of-apps
  # uses directory recursion, so the old Application manifest must keep a
  # non-YAML extension or Argo CD will still apply it.
  # - longhorn.yaml.disabled
  # The validation workload also depends on Longhorn being fully installed. Keep
  # it disabled during cluster bootstrap/reinstall so it cannot recreate PVCs and
  # pods while the Ansible-owned Longhorn release is still converging.
  # - longhorn-chaos-workload.yaml.disabled

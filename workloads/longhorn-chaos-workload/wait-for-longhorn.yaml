apiVersion: v1
kind: ServiceAccount
metadata:
  name: longhorn-chaos-workload-sync
  namespace: longhorn-chaos-workload
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
  labels:
    app.kubernetes.io/name: longhorn-chaos-workload-sync
    app.kubernetes.io/part-of: longhorn-validation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: longhorn-chaos-workload-sync
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
  labels:
    app.kubernetes.io/name: longhorn-chaos-workload-sync
    app.kubernetes.io/part-of: longhorn-validation
rules:
  - apiGroups:
      - storage.k8s.io
    resources:
      - storageclasses
    verbs:
      - get
  - apiGroups:
      - apps
    resources:
      - daemonsets
      - deployments
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: longhorn-chaos-workload-sync
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
  labels:
    app.kubernetes.io/name: longhorn-chaos-workload-sync
    app.kubernetes.io/part-of: longhorn-validation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: longhorn-chaos-workload-sync
subjects:
  - kind: ServiceAccount
    name: longhorn-chaos-workload-sync
    namespace: longhorn-chaos-workload
---
apiVersion: batch/v1
kind: Job
metadata:
  name: wait-for-longhorn
  namespace: longhorn-chaos-workload
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
    argocd.argoproj.io/sync-options: Force=true,Replace=true
  labels:
    app.kubernetes.io/name: wait-for-longhorn
    app.kubernetes.io/part-of: longhorn-validation
spec:
  activeDeadlineSeconds: 900
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wait-for-longhorn
        app.kubernetes.io/part-of: longhorn-validation
    spec:
      initContainers:
        - name: wait-storageclass
          image: registry.k8s.io/kubectl:v1.32.3
          imagePullPolicy: IfNotPresent
          command:
            - kubectl
          args:
            - wait
            - --for=create
            - storageclass/longhorn
            - --timeout=900s
        - name: wait-driver-deployer
          image: registry.k8s.io/kubectl:v1.32.3
          imagePullPolicy: IfNotPresent
          command:
            - kubectl
          args:
            - -n
            - longhorn-system
            - rollout
            - status
            - deployment/longhorn-driver-deployer
            - --timeout=900s
        - name: wait-manager
          image: registry.k8s.io/kubectl:v1.32.3
          imagePullPolicy: IfNotPresent
          command:
            - kubectl
          args:
            - -n
            - longhorn-system
            - rollout
            - status
            - daemonset/longhorn-manager
            - --timeout=900s
      restartPolicy: Never
      serviceAccountName: longhorn-chaos-workload-sync
      containers:
        - name: wait
          image: registry.k8s.io/kubectl:v1.32.3
          imagePullPolicy: IfNotPresent
          command:
            - kubectl
          args:
            - get
            - storageclass
            - longhorn

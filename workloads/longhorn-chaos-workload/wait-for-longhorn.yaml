apiVersion: v1
kind: ServiceAccount
metadata:
  name: longhorn-chaos-workload-sync
  namespace: longhorn-chaos-workload
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
  labels:
    app.kubernetes.io/name: longhorn-chaos-workload-sync
    app.kubernetes.io/part-of: longhorn-validation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: longhorn-chaos-workload-sync
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
  labels:
    app.kubernetes.io/name: longhorn-chaos-workload-sync
    app.kubernetes.io/part-of: longhorn-validation
rules:
  - apiGroups:
      - storage.k8s.io
    resources:
      - storageclasses
    verbs:
      - get
  - apiGroups:
      - apps
    resources:
      - daemonsets
      - deployments
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: longhorn-chaos-workload-sync
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
  labels:
    app.kubernetes.io/name: longhorn-chaos-workload-sync
    app.kubernetes.io/part-of: longhorn-validation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: longhorn-chaos-workload-sync
subjects:
  - kind: ServiceAccount
    name: longhorn-chaos-workload-sync
    namespace: longhorn-chaos-workload
---
apiVersion: batch/v1
kind: Job
metadata:
  name: wait-for-longhorn
  namespace: longhorn-chaos-workload
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
  labels:
    app.kubernetes.io/name: wait-for-longhorn
    app.kubernetes.io/part-of: longhorn-validation
spec:
  activeDeadlineSeconds: 900
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wait-for-longhorn
        app.kubernetes.io/part-of: longhorn-validation
    spec:
      restartPolicy: Never
      serviceAccountName: longhorn-chaos-workload-sync
      containers:
        - name: wait
          image: bitnami/kubectl:1.32
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              deadline=$((SECONDS + 900))

              until kubectl get storageclass longhorn >/dev/null 2>&1; do
                if [ "${SECONDS}" -ge "${deadline}" ]; then
                  echo "timed out waiting for storageclass/longhorn"
                  exit 1
                fi
                echo "waiting for storageclass/longhorn"
                sleep 10
              done

              until kubectl -n longhorn-system rollout status deployment/longhorn-driver-deployer --timeout=30s; do
                if [ "${SECONDS}" -ge "${deadline}" ]; then
                  echo "timed out waiting for deployment/longhorn-driver-deployer"
                  exit 1
                fi
                echo "waiting for longhorn-driver-deployer"
                sleep 10
              done

              until kubectl -n longhorn-system rollout status daemonset/longhorn-manager --timeout=30s; do
                if [ "${SECONDS}" -ge "${deadline}" ]; then
                  echo "timed out waiting for daemonset/longhorn-manager"
                  exit 1
                fi
                echo "waiting for daemonset/longhorn-manager"
                sleep 10
              done

              echo "longhorn is ready for validation workloads"
